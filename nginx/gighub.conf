# ─────────────────────────────────────────────────────────────────────────────
# GigHub Frontend — Nginx Configuration
# Domain: gighub.work + www.gighub.work
# Server: Ubuntu EC2 at 16.171.13.210
#
# SETUP STEPS (run on server):
#   1. sudo apt update && sudo apt install -y nginx certbot python3-certbot-nginx
#   2. sudo mkdir -p /var/www/gighub/dist
#   3. sudo cp gighub.conf /etc/nginx/sites-available/gighub
#   4. sudo ln -sf /etc/nginx/sites-available/gighub /etc/nginx/sites-enabled/gighub
#   5. sudo rm -f /etc/nginx/sites-enabled/default
#   6. sudo nginx -t && sudo systemctl reload nginx
#   7. sudo certbot --nginx -d gighub.work -d www.gighub.work
#   8. sudo systemctl enable nginx
# ─────────────────────────────────────────────────────────────────────────────

# Redirect HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name gighub.work www.gighub.work;

    # Allow Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — Main site
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name gighub.work www.gighub.work;

    # ── SSL (Certbot will populate/update these) ──────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/gighub.work/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/gighub.work/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header X-Frame-Options           "SAMEORIGIN"            always;
    add_header X-Content-Type-Options    "nosniff"               always;
    add_header X-XSS-Protection          "1; mode=block"         always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # ── Root & index ──────────────────────────────────────────────────────────
    root  /var/www/gighub/dist;
    index index.html;

    # ── Gzip compression ──────────────────────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_buffers      16 8k;
    gzip_http_version 1.1;
    gzip_min_length   256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/x-javascript
        application/xml
        image/svg+xml
        image/x-icon
        application/vnd.ms-fontobject
        font/eot
        font/otf
        font/ttf
        font/woff
        font/woff2;

    # ── Static asset caching ──────────────────────────────────────────────────
    # Vite hashed assets (immutable)
    location ~* \.(?:js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico|webp|avif)$ {
        expires     1y;
        add_header  Cache-Control "public, immutable";
        access_log  off;
        try_files   $uri =404;
    }

    # PWA manifest + service worker (no cache — must always be fresh)
    location ~* ^/(manifest\.webmanifest|sw\.js)$ {
        expires      0;
        add_header   Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate";
        access_log   off;
        try_files    $uri =404;
    }

    # ── SPA fallback ──────────────────────────────────────────────────────────
    # All routes serve index.html so React Router handles them client-side
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # ── Logging ───────────────────────────────────────────────────────────────
    access_log /var/log/nginx/gighub.access.log;
    error_log  /var/log/nginx/gighub.error.log warn;

    # ── Large file uploads (for CV uploads etc.) ──────────────────────────────
    client_max_body_size 20M;
}
