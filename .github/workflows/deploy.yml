name: Deploy GigHub Frontend

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    name: Build & Deploy to EC2
    runs-on: ubuntu-latest

    steps:
      # ─── 1. Checkout ───────────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ─── 2. Setup Node.js ──────────────────────────────────────────────────
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ─── 3. Install dependencies ───────────────────────────────────────────
      - name: Install dependencies
        run: npm ci

      # ─── 4. Build (inject production env vars from GitHub Secrets) ─────────
      - name: Build Vite app
        env:
          VITE_API_URL: ${{ secrets.SERVER_ENV.VITE_API_URL }}
          VITE_API_FILE_SERVICE: ${{ secrets.SERVER_ENV.VITE_API_FILE_SERVICE }}
          VITE_API_SUBSCRIPTION_SERVICE: ${{ secrets.SERVER_ENV.VITE_API_SUBSCRIPTION_SERVICE }}
          VITE_API_FRONTEND_BASE_URL: ${{ secrets.SERVER_ENV.VITE_API_FRONTEND_BASE_URL }}
          VITE_APP_TITLE: ${{ secrets.SERVER_ENV.VITE_APP_TITLE }}
          VITE_API_CHAT_SERVER_URL: ${{ secrets.SERVER_ENV.VITE_API_CHAT_SERVER_URL }}
          VITE_NOTIFICATION_SOCKET_URL: ${{ secrets.SERVER_ENV.VITE_NOTIFICATION_SOCKET_URL }}
          VITE_API_AVATAR: ${{ secrets.SERVER_ENV.VITE_API_AVATAR }}
          VITE_API_NOTIFICATION_SERVICE: ${{ secrets.SERVER_ENV.VITE_API_NOTIFICATION_SERVICE }}
          VITE_APP_GIGHUB_SUPPORT_MAIL: ${{ secrets.SERVER_ENV.VITE_APP_GIGHUB_SUPPORT_MAIL }}
          VITE_APP_GIGHUB_PHONE_NUMBER: ${{ secrets.SERVER_ENV.VITE_APP_GIGHUB_PHONE_NUMBER }}
          VITE_APP_GIGHUB_WHATSAPP_NUMBER: ${{ secrets.SERVER_ENV.VITE_APP_GIGHUB_WHATSAPP_NUMBER }}
          VITE_APP_GIGHUB_ADDRESS: ${{ secrets.SERVER_ENV.VITE_APP_GIGHUB_ADDRESS }}
          VITE_APP_GIGHUB_FACEBOOK_URL: ${{ secrets.SERVER_ENV.VITE_APP_GIGHUB_FACEBOOK_URL }}
          VITE_APP_GIGHUB_TWITTER_URL: ${{ secrets.SERVER_ENV.VITE_APP_GIGHUB_TWITTER_URL }}
          VITE_APP_GIGHUB_INSTAGRAM_URL: ${{ secrets.SERVER_ENV.VITE_APP_GIGHUB_INSTAGRAM_URL }}
          VITE_APP_GIGHUB_LINKEDIN_URL: ${{ secrets.SERVER_ENV.VITE_APP_GIGHUB_LINKEDIN_URL }}
          VITE_APP_GIGHUB_LEGAL_TEAM_EMAIL: ${{ secrets.SERVER_ENV.VITE_APP_GIGHUB_LEGAL_TEAM_EMAIL }}
          VITE_API_AI_SERVICE_BASE_URL: ${{ secrets.SERVER_ENV.VITE_API_AI_SERVICE_BASE_URL }}
        run: npm run build

      # ─── 5. Setup SSH ──────────────────────────────────────────────────────
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

      # ─── 6. Sync dist/ to server ───────────────────────────────────────────
      - name: Deploy dist to server
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no" \
            dist/ \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/var/www/gighub/dist/

      # ─── 7. Restart PM2 on server ──────────────────────────────────────────
      - name: Restart PM2
        run: |
          ssh -i ~/.ssh/id_rsa \
            -o StrictHostKeyChecking=no \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} \
            "pm2 reload gighub --update-env 2>/dev/null || pm2 serve /var/www/gighub/dist 3000 --name gighub --spa && pm2 save"

      # ─── 8. Health check ───────────────────────────────────────────────────
      - name: Verify deployment
        run: |
          ssh -i ~/.ssh/id_rsa \
            -o StrictHostKeyChecking=no \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} \
            "pm2 list | grep gighub && echo '✅ GigHub is running' || (echo '❌ PM2 process not found' && exit 1)"
