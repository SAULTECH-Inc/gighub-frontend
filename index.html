<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- PWA / Mobile -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="GigHub" />
    <meta name="application-name" content="GigHub" />

    <!-- SEO -->
    <meta name="description" content="GigHub — Your platform for hiring top talent and finding your next job. Connect with employers and job seekers worldwide." />
    <meta name="keywords" content="jobs, hiring, gig work, talent, recruitment, remote work, Nigeria" />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://gighub.work/" />
    <meta property="og:title" content="GigHub — Hire & Get Hired" />
    <meta property="og:description" content="Connect with top employers and job seekers on GigHub." />
    <meta property="og:image" content="https://gighub.work/icons/icon-512.png" />

    <!-- Theme -->
    <meta name="theme-color" content="#2563eb" />

    <!-- Icons -->
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.webmanifest" />

    <!-- Preconnect for performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,200..1000;1,200..1000&display=swap" rel="stylesheet" />

    <!-- DNS prefetch for API domains (update with your actual API domains) -->
    <link rel="dns-prefetch" href="https://api.dicebear.com" />

    <title>GigHub — Hire & Get Hired</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
